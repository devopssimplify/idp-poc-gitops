apiVersion: apps/v1
kind: Deployment
metadata:
  name: pds-ui
  namespace: pds-510
  labels:
    app: pds-ui
    team: backend
    network-code: CN580005
    version: "v1.0"
    managed-by: backstage
  annotations:
    description: "Deployment for pds-ui version v1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pds-ui
  template:
    metadata:
      labels:
        app: pds-ui
        team: backend
        network-code: CN580005
        version: "v1.0"
    spec:
      containers:
      - name: pds-ui
        image: us-docker.pkg.dev/google-samples/containers/gke/hello-app:1.0
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        env:
        - name: APP_VERSION
          value: "v1.0"
        - name: ENVIRONMENT
          value: "pds-510"
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
