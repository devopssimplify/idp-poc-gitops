apiVersion: apps/v1
kind: Deployment
metadata:
  name: pds-ui
  namespace: pds-502
  labels:
    app: pds-ui
    team: platform
    version: "v1.0"
    managed-by: backstage
  annotations:
    description: "Deployment for pds-ui version v1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pds-ui
  template:
    metadata:
      labels:
        app: pds-ui
        team: platform
        version: "v1.0"
    spec:
      containers:
      - name: pds-ui
        image: n8nio/n8n:nightly
        ports:
        - containerPort: 8081
          name: http
          protocol: TCP
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        env:
        - name: APP_VERSION
          value: "v1.0"
        - name: ENVIRONMENT
          value: "pds-502"
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
