apiVersion: apps/v1
kind: Deployment
metadata:
  name: testdeploy
  namespace: test-1000
  labels:
    app: testdeploy
    team: platform
    version: "1.0"
    managed-by: backstage
  annotations:
    description: "Deployment for testdeploy version 1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: testdeploy
  template:
    metadata:
      labels:
        app: testdeploy
        team: platform
        version: "1.0"
    spec:
      containers:
      - name: testdeploy
        image: us-docker.pkg.dev/google-samples/containers/gke/hello-app:1.0
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        env:
        - name: APP_VERSION
          value: "1.0"
        - name: ENVIRONMENT
          value: "test-1000"
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
