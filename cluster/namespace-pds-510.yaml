apiVersion: v1
kind: Namespace
metadata:
  name: pds-510
  labels:
    team: backend
    network-code: CN580005
    managed-by: backstage
  annotations:
    description: "test"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: pds-510-quota
  namespace: pds-510
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    persistentvolumeclaims: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: pds-510-limits
  namespace: pds-510
spec:
  limits:
  - max:
      cpu: "2"
      memory: 4Gi
    min:
      cpu: 100m
      memory: 128Mi
    default:
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      cpu: 100m
      memory: 128Mi
    type: Container
