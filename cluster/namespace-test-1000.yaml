apiVersion: v1
kind: Namespace
metadata:
  name: test-1000
  labels:
    team: platform
    managed-by: backstage
  annotations:
    description: 
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: test-1000-quota
  namespace: test-1000
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    persistentvolumeclaims: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: test-1000-limits
  namespace: test-1000
spec:
  limits:
  - max:
      cpu: "2"
      memory: 4Gi
    min:
      cpu: 100m
      memory: 128Mi
    default:
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      cpu: 100m
      memory: 128Mi
    type: Container
