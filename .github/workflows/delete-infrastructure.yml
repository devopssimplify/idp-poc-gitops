name: Delete Infrastructure Resource

on:
  workflow_dispatch:
    inputs:
      resourceType:
        description: 'Type of resource to delete'
        required: true
        type: choice
        options:
          - CockroachDB Database
          - Kafka Cluster
          - Application Deployment
      resourceName:
        description: 'Name of the resource'
        required: true
        type: string
      environment:
        description: 'Environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - production
      reason:
        description: 'Reason for deletion'
        required: false
        type: string

jobs:
  delete-infrastructure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config user.name "Backstage Scaffolder"
          git config user.email "scaffolder@backstage.io"

      - name: Create branch
        run: |
          BRANCH_NAME="delete-${{ inputs.resourceName }}-${{ inputs.environment }}"
          git checkout -b "$BRANCH_NAME"

      - name: Delete CockroachDB files
        if: inputs.resourceType == 'CockroachDB Database'
        run: |
          FILES_DELETED=false
          if [ -f "infra/cockroachdb-${{ inputs.resourceName }}.yaml" ]; then
            git rm "infra/cockroachdb-${{ inputs.resourceName }}.yaml"
            FILES_DELETED=true
          fi
          if [ -f "infra/cockroachdb-${{ inputs.resourceName }}-backup.yaml" ]; then
            git rm "infra/cockroachdb-${{ inputs.resourceName }}-backup.yaml"
            FILES_DELETED=true
          fi
          echo "FILES_DELETED=$FILES_DELETED" >> $GITHUB_ENV

      - name: Delete Kafka Cluster files
        if: inputs.resourceType == 'Kafka Cluster'
        run: |
          FILES_DELETED=false
          if [ -f "infra/kafka-${{ inputs.resourceName }}.yaml" ]; then
            git rm "infra/kafka-${{ inputs.resourceName }}.yaml"
            FILES_DELETED=true
          fi
          echo "FILES_DELETED=$FILES_DELETED" >> $GITHUB_ENV

      - name: Delete Application files
        if: inputs.resourceType == 'Application Deployment'
        run: |
          FILES_DELETED=false
          if [ -f "apps/${{ inputs.resourceName }}-deployment.yaml" ]; then
            git rm "apps/${{ inputs.resourceName }}-deployment.yaml"
            FILES_DELETED=true
          fi
          if [ -f "apps/${{ inputs.resourceName }}-service.yaml" ]; then
            git rm "apps/${{ inputs.resourceName }}-service.yaml"
            FILES_DELETED=true
          fi
          echo "FILES_DELETED=$FILES_DELETED" >> $GITHUB_ENV

      - name: Commit changes
        run: |
          if [ "$FILES_DELETED" = "true" ]; then
            git commit -m "chore: Delete ${{ inputs.resourceType }} - ${{ inputs.resourceName }}

Reason: ${{ inputs.reason }}

🤖 Generated by Backstage Scaffolder"
          else
            echo "No files found to delete"
            exit 1
          fi

      - name: Push branch
        run: |
          BRANCH_NAME="delete-${{ inputs.resourceName }}-${{ inputs.environment }}"
          git push origin "$BRANCH_NAME"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="delete-${{ inputs.resourceName }}-${{ inputs.environment }}"

          cat > pr_body.md << 'EOF'
## Infrastructure Deletion Request

**Resource Type**: ${{ inputs.resourceType }}
**Resource Name**: ${{ inputs.resourceName }}
**Environment**: ${{ inputs.environment }}
**Reason**: ${{ inputs.reason }}

---

## What This PR Does

This PR deletes the infrastructure resource files from the repository.

## Next Steps

1. **Review this PR** - Verify the correct files are being deleted
2. **Merge this PR** - Config Sync will automatically remove the resources from the cluster
3. **Verify Deletion** (Optional) - After merge, run:

```bash
kubectl get all -n ${{ inputs.environment }} -l app=${{ inputs.resourceName }}
```

You should see "No resources found" if deletion was successful.

---

⚠️ **WARNING**: This action cannot be undone. All data will be permanently lost.

This PR was created by the Backstage scaffolder via GitHub Actions.
EOF

          gh pr create \
            --title "chore: Delete ${{ inputs.resourceType }} - ${{ inputs.resourceName }}" \
            --body-file pr_body.md \
            --base main \
            --head "$BRANCH_NAME"
