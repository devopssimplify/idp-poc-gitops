name: Delete Kafka Cluster

on:
  workflow_dispatch:
    inputs:
      namePrefix:
        description: 'Kafka cluster name prefix (e.g. "pds" deletes pds-kafka cluster and pds-kafka-ui)'
        required: true
        type: string
      environment:
        description: 'Namespace where the Kafka cluster runs (dev/staging/production)'
        required: true
        type: string
      reason:
        description: 'Reason for deletion'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  delete-kafka-cluster:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config user.name "Backstage Scaffolder"
          git config user.email "scaffolder@backstage.io"

      - name: Create branch
        env:
          NAME_PREFIX: ${{ inputs.namePrefix }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          BRANCH_NAME="delete-kafka-cluster-${NAME_PREFIX}-${ENVIRONMENT}"
          git checkout -B "$BRANCH_NAME"

      - name: Delete Kafka cluster and topic files
        env:
          NAME_PREFIX: ${{ inputs.namePrefix }}
        run: |
          FILES_DELETED=false
          for FILE in \
            "infra/kafka-${NAME_PREFIX}-kafka.yaml" \
            "infra/kafka-ui-${NAME_PREFIX}.yaml"; do
            if [ -f "$FILE" ]; then
              git rm "$FILE"
              FILES_DELETED=true
              echo "Deleted: $FILE"
            else
              echo "Not found (skipping): $FILE"
            fi
          done
          for FILE in infra/kafka-topics-${NAME_PREFIX}-*.yaml infra/kafka-topics-${NAME_PREFIX}.yaml; do
            if [ -f "$FILE" ]; then
              git rm "$FILE"
              FILES_DELETED=true
              echo "Deleted topic file: $FILE"
            fi
          done
          echo "FILES_DELETED=$FILES_DELETED" >> $GITHUB_ENV

      - name: Commit changes
        env:
          NAME_PREFIX: ${{ inputs.namePrefix }}
          ENVIRONMENT: ${{ inputs.environment }}
          REASON: ${{ inputs.reason }}
        run: |
          if [ "$FILES_DELETED" = "true" ]; then
            git commit -m "chore: delete Kafka cluster ${NAME_PREFIX}-kafka from ${ENVIRONMENT} — ${REASON}"
          else
            echo "No Kafka cluster files found for prefix '${NAME_PREFIX}' - nothing to delete"
            exit 1
          fi

      - name: Push branch
        env:
          NAME_PREFIX: ${{ inputs.namePrefix }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          BRANCH_NAME="delete-kafka-cluster-${NAME_PREFIX}-${ENVIRONMENT}"
          git push --force origin "$BRANCH_NAME"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NAME_PREFIX: ${{ inputs.namePrefix }}
          ENVIRONMENT: ${{ inputs.environment }}
          REASON: ${{ inputs.reason }}
        run: |
          BRANCH_NAME="delete-kafka-cluster-${NAME_PREFIX}-${ENVIRONMENT}"
          PR_TITLE="chore: Delete Kafka cluster ${NAME_PREFIX}-kafka from ${ENVIRONMENT}"
          printf '## Kafka Cluster Deletion Request\n\n**Cluster**: `%s-kafka` | **Environment**: `%s` | **Reason**: %s\n\n## Files Deleted\n\n- `infra/kafka-%s-kafka.yaml`\n- `infra/kafka-ui-%s.yaml`\n- `infra/kafka-topics-%s-*.yaml` (all topic batch files)\n\n> **WARNING**: Irreversible. All Kafka data and topics will be permanently lost.\n\n_Created by Backstage scaffolder._\n' \
            "${NAME_PREFIX}" "${ENVIRONMENT}" "${REASON}" \
            "${NAME_PREFIX}" "${NAME_PREFIX}" "${NAME_PREFIX}" > pr_body.md
          EXISTING_PR=$(gh pr list --head "$BRANCH_NAME" --json number --jq '.[0].number' || echo "")
          if [ -n "$EXISTING_PR" ]; then
            gh pr edit "$EXISTING_PR" --title "$PR_TITLE" --body-file pr_body.md
          else
            gh pr create --title "$PR_TITLE" --body-file pr_body.md --base main --head "$BRANCH_NAME"
          fi
