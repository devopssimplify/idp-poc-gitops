name: Delete Kafka Cluster

on:
  workflow_dispatch:
    inputs:
      namePrefix:
        description: 'Kafka cluster name prefix (e.g. "pds" deletes pds-kafka cluster and pds-kafka-ui)'
        required: true
        type: string
      environment:
        description: 'Namespace where the Kafka cluster runs (dev/staging/production)'
        required: true
        type: string
      reason:
        description: 'Reason for deletion'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  delete-kafka-cluster:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config user.name "Backstage Scaffolder"
          git config user.email "scaffolder@backstage.io"

      - name: Create branch
        env:
          NAME_PREFIX: ${{ inputs.namePrefix }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          BRANCH_NAME="delete-kafka-cluster-${NAME_PREFIX}-${ENVIRONMENT}"
          git checkout -B "$BRANCH_NAME"

      - name: Delete Kafka cluster and topic files
        env:
          NAME_PREFIX: ${{ inputs.namePrefix }}
        run: |
          FILES_DELETED=false
          for FILE in \
            "infra/kafka-${NAME_PREFIX}-kafka.yaml" \
            "infra/kafka-ui-${NAME_PREFIX}.yaml"; do
            if [ -f "$FILE" ]; then
              git rm "$FILE"
              FILES_DELETED=true
              echo "Deleted: $FILE"
            else
              echo "Not found (skipping): $FILE"
            fi
          done
          for FILE in infra/kafka-topics-${NAME_PREFIX}-*.yaml infra/kafka-topics-${NAME_PREFIX}.yaml; do
            if [ -f "$FILE" ]; then
              git rm "$FILE"
              FILES_DELETED=true
              echo "Deleted topic file: $FILE"
            fi
          done
          echo "FILES_DELETED=$FILES_DELETED" >> $GITHUB_ENV

      - name: Commit changes
        env:
          NAME_PREFIX: ${{ inputs.namePrefix }}
          ENVIRONMENT: ${{ inputs.environment }}
          REASON: ${{ inputs.reason }}
        run: |
          if [ "$FILES_DELETED" = "true" ]; then
            git commit -m "chore: delete Kafka cluster ${NAME_PREFIX}-kafka from ${ENVIRONMENT} — ${REASON}"
          else
            echo "No Kafka cluster files found for prefix '${NAME_PREFIX}' - nothing to delete"
            exit 1
          fi

      - name: Push branch
        env:
          NAME_PREFIX: ${{ inputs.namePrefix }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          BRANCH_NAME="delete-kafka-cluster-${NAME_PREFIX}-${ENVIRONMENT}"
          git push --force origin "$BRANCH_NAME"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NAME_PREFIX: ${{ inputs.namePrefix }}
          ENVIRONMENT: ${{ inputs.environment }}
          REASON: ${{ inputs.reason }}
        run: |
          BRANCH_NAME="delete-kafka-cluster-${NAME_PREFIX}-${ENVIRONMENT}"
          PR_TITLE="chore: Delete Kafka cluster ${NAME_PREFIX}-kafka from ${ENVIRONMENT}"

          cat > pr_body.md << EOF
## Kafka Cluster Deletion Request

**Cluster Name**: \`${NAME_PREFIX}-kafka\`
**Environment**: \`${ENVIRONMENT}\`
**Reason**: ${REASON}

---

## Files Being Deleted

- \`infra/kafka-${NAME_PREFIX}-kafka.yaml\` — Strimzi Kafka CR (broker + zookeeper)
- \`infra/kafka-ui-${NAME_PREFIX}.yaml\` — Kafka UI pod
- \`infra/kafka-topics-${NAME_PREFIX}-*.yaml\` — all topic batch files
- \`infra/kafka-topics-${NAME_PREFIX}.yaml\` — legacy topic file (if present)

## Next Steps

1. **Review this PR** — Verify the correct cluster is being deleted
2. **Merge this PR** — Config Sync will remove all cluster resources and topics from the namespace
3. **Verify Deletion** — After merge, run:
\`\`\`bash
kubectl get kafka -n ${ENVIRONMENT}
kubectl get kafkatopic -n ${ENVIRONMENT}
kubectl get pod -n ${ENVIRONMENT} | grep ${NAME_PREFIX}
\`\`\`

> **WARNING**: This is irreversible. All Kafka data and topics on this cluster will be permanently lost.

_This PR was created by the Backstage scaffolder via GitHub Actions._
EOF

          EXISTING_PR=$(gh pr list --head "$BRANCH_NAME" --json number --jq '.[0].number' || echo "")
          if [ -n "$EXISTING_PR" ]; then
            gh pr edit "$EXISTING_PR" --title "$PR_TITLE" --body-file pr_body.md
          else
            gh pr create \
              --title "$PR_TITLE" \
              --body-file pr_body.md \
              --base main \
              --head "$BRANCH_NAME"
          fi
