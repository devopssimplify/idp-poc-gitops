name: Delete Kafka Topics

on:
  workflow_dispatch:
    inputs:
      namePrefix:
        description: 'Kafka cluster name prefix (e.g. "pds" deletes topics in pds-kafka cluster)'
        required: true
        type: string
      environment:
        description: 'Namespace where the Kafka cluster runs (dev/staging/production)'
        required: true
        type: string
      reason:
        description: 'Reason for deletion'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  delete-kafka-topics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config user.name "Backstage Scaffolder"
          git config user.email "scaffolder@backstage.io"

      - name: Create branch
        env:
          NAME_PREFIX: ${{ inputs.namePrefix }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          BRANCH_NAME="delete-kafka-topics-${NAME_PREFIX}-${ENVIRONMENT}"
          git checkout -b "$BRANCH_NAME"

      - name: Delete Kafka topics file
        env:
          NAME_PREFIX: ${{ inputs.namePrefix }}
        run: |
          FILES_DELETED=false
          TOPICS_FILE="infra/kafka-topics-${NAME_PREFIX}.yaml"
          if [ -f "$TOPICS_FILE" ]; then
            git rm "$TOPICS_FILE"
            FILES_DELETED=true
            echo "Deleted: $TOPICS_FILE"
          else
            echo "Not found (skipping): $TOPICS_FILE"
          fi
          echo "FILES_DELETED=$FILES_DELETED" >> $GITHUB_ENV

      - name: Commit changes
        env:
          NAME_PREFIX: ${{ inputs.namePrefix }}
          ENVIRONMENT: ${{ inputs.environment }}
          REASON: ${{ inputs.reason }}
        run: |
          if [ "$FILES_DELETED" = "true" ]; then
            git commit -m "chore: delete Kafka topics for ${NAME_PREFIX}-kafka in ${ENVIRONMENT} — ${REASON}"
          else
            echo "No Kafka topics file found for prefix '${NAME_PREFIX}' - nothing to delete"
            exit 1
          fi

      - name: Push branch
        env:
          NAME_PREFIX: ${{ inputs.namePrefix }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          BRANCH_NAME="delete-kafka-topics-${NAME_PREFIX}-${ENVIRONMENT}"
          git push --force origin "$BRANCH_NAME"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NAME_PREFIX: ${{ inputs.namePrefix }}
          ENVIRONMENT: ${{ inputs.environment }}
          REASON: ${{ inputs.reason }}
        run: |
          BRANCH_NAME="delete-kafka-topics-${NAME_PREFIX}-${ENVIRONMENT}"
          PR_TITLE="chore: Delete Kafka topics for ${NAME_PREFIX}-kafka in ${ENVIRONMENT}"

          cat > pr_body.md << EOF
## Kafka Topics Deletion Request

**Cluster**: \`${NAME_PREFIX}-kafka\`
**Environment**: \`${ENVIRONMENT}\`
**Reason**: ${REASON}

---

## Files Being Deleted

- \`infra/kafka-topics-${NAME_PREFIX}.yaml\` — All KafkaTopic CRDs for this cluster

## Next Steps

1. **Review this PR** — Verify the correct topics file is being deleted
2. **Merge this PR** — Config Sync will remove all KafkaTopic resources from the cluster
3. **Verify Deletion** — After merge, run:
\`\`\`bash
kubectl get kafkatopics -n ${ENVIRONMENT} | grep ${NAME_PREFIX}
\`\`\`

> **WARNING**: This is irreversible. All messages stored in these topics will be permanently lost.

_This PR was created by the Backstage scaffolder via GitHub Actions._
EOF

          EXISTING_PR=$(gh pr list --head "$BRANCH_NAME" --json number --jq '.[0].number' || echo "")
          if [ -n "$EXISTING_PR" ]; then
            gh pr edit "$EXISTING_PR" --title "$PR_TITLE" --body-file pr_body.md
          else
            gh pr create \
              --title "$PR_TITLE" \
              --body-file pr_body.md \
              --base main \
              --head "$BRANCH_NAME"
          fi
