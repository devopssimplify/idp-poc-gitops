name: Delete Infrastructure Resource
on:
  workflow_dispatch:
    inputs:
      resourceType:
        description: 'Type of resource to delete'
        required: true
        type: choice
        options:
          - CockroachDB Database
          - Application Deployment
      resourceName:
        description: 'For CockroachDB - database name (e.g., pds-500-db)'
        required: true
        type: string
      environment:
        description: 'For CockroachDB - environment (dev/staging/production). For Application - namespace folder (e.g., pds-501, pds-500)'
        required: true
        type: string
      reason:
        description: 'Reason for deletion'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  delete-infrastructure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config user.name "Backstage Scaffolder"
          git config user.email "scaffolder@backstage.io"

      - name: Create branch
        env:
          RESOURCE_NAME: ${{ inputs.resourceName }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          BRANCH_NAME="delete-${RESOURCE_NAME}-${ENVIRONMENT}"
          git checkout -b "$BRANCH_NAME"

      - name: Delete CockroachDB files
        if: inputs.resourceType == 'CockroachDB Database'
        env:
          RESOURCE_NAME: ${{ inputs.resourceName }}
        run: |
          FILES_DELETED=false
          if [ -f "infra/cockroachdb-${RESOURCE_NAME}.yaml" ]; then
            git rm "infra/cockroachdb-${RESOURCE_NAME}.yaml"
            FILES_DELETED=true
          fi
          if [ -f "infra/cockroachdb-${RESOURCE_NAME}-backup.yaml" ]; then
            git rm "infra/cockroachdb-${RESOURCE_NAME}-backup.yaml"
            FILES_DELETED=true
          fi
          echo "FILES_DELETED=$FILES_DELETED" >> $GITHUB_ENV

      - name: Delete Application files
        if: inputs.resourceType == 'Application Deployment'
        env:
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          FILES_DELETED=false
          if [ -d "apps/${ENVIRONMENT}" ]; then
            git rm -r "apps/${ENVIRONMENT}"
            FILES_DELETED=true
          fi
          echo "FILES_DELETED=$FILES_DELETED" >> $GITHUB_ENV

      - name: Commit changes
        env:
          RESOURCE_TYPE: ${{ inputs.resourceType }}
          RESOURCE_NAME: ${{ inputs.resourceName }}
          ENVIRONMENT: ${{ inputs.environment }}
          REASON: ${{ inputs.reason }}
        run: |
          if [ "$FILES_DELETED" = "true" ]; then
            if [ "${RESOURCE_TYPE}" = "Application Deployment" ]; then
              COMMIT_MSG=$(printf "chore: Delete %s - namespace %s\n\nReason: %s\nGenerated by Backstage Scaffolder" \
                "${RESOURCE_TYPE}" "${ENVIRONMENT}" "${REASON}")
            else
              COMMIT_MSG=$(printf "chore: Delete %s - %s\n\nReason: %s\nGenerated by Backstage Scaffolder" \
                "${RESOURCE_TYPE}" "${RESOURCE_NAME}" "${REASON}")
            fi
            git commit -m "$COMMIT_MSG"
          else
            echo "No files found to delete"
            exit 1
          fi

      - name: Push branch
        env:
          RESOURCE_NAME: ${{ inputs.resourceName }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          BRANCH_NAME="delete-${RESOURCE_NAME}-${ENVIRONMENT}"
          git push --force origin "$BRANCH_NAME"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RESOURCE_TYPE: ${{ inputs.resourceType }}
          RESOURCE_NAME: ${{ inputs.resourceName }}
          ENVIRONMENT: ${{ inputs.environment }}
          REASON: ${{ inputs.reason }}
        run: |
          BRANCH_NAME="delete-${RESOURCE_NAME}-${ENVIRONMENT}"
          if [ "${RESOURCE_TYPE}" = "Application Deployment" ]; then
            cat > pr_body.md << EOF
          ## Infrastructure Deletion Request
          **Resource Type**: ${RESOURCE_TYPE}
          **Namespace/Folder**: ${ENVIRONMENT}
          **Reason**: ${REASON}
          ---
          ## What This PR Does
          This PR deletes the entire \`apps/${ENVIRONMENT}/\` folder and all application deployments within it.
          ## Next Steps
          1. **Review this PR** - Verify the correct folder and files are being deleted
          2. **Merge this PR** - Config Sync will automatically remove all resources from the cluster
          3. **Verify Deletion** (Optional) - After merge, run:
          \`\`\`bash
          kubectl get all -n ${ENVIRONMENT}
          \`\`\`
          You should see "No resources found" if deletion was successful.
          ---
          WARNING: This action cannot be undone. All applications in namespace ${ENVIRONMENT} will be permanently deleted.
          This PR was created by the Backstage scaffolder via GitHub Actions.
          EOF
          else
            cat > pr_body.md << EOF
          ## Infrastructure Deletion Request
          **Resource Type**: ${RESOURCE_TYPE}
          **Resource Name**: ${RESOURCE_NAME}
          **Environment**: ${ENVIRONMENT}
          **Reason**: ${REASON}
          ---
          ## What This PR Does
          This PR deletes the infrastructure resource files from the repository.
          ## Next Steps
          1. **Review this PR** - Verify the correct files are being deleted
          2. **Merge this PR** - Config Sync will automatically remove the resources from the cluster
          3. **Verify Deletion** (Optional) - After merge, run:
          \`\`\`bash
          kubectl get all -n ${ENVIRONMENT}
          \`\`\`
          You should see "No resources found" if deletion was successful.
          ---
          WARNING: This action cannot be undone. All data will be permanently lost.
          This PR was created by the Backstage scaffolder via GitHub Actions.
          EOF
          fi
          # Check if PR already exists
          EXISTING_PR=$(gh pr list --head "$BRANCH_NAME" --json number --jq '.[0].number' || echo "")

          if [ "${RESOURCE_TYPE}" = "Application Deployment" ]; then
            PR_TITLE="chore: Delete ${RESOURCE_TYPE} - namespace ${ENVIRONMENT}"
          else
            PR_TITLE="chore: Delete ${RESOURCE_TYPE} - ${RESOURCE_NAME}"
          fi

          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists for branch $BRANCH_NAME, updating it..."
            gh pr edit "$EXISTING_PR" --title "$PR_TITLE" --body-file pr_body.md
          else
            echo "Creating new PR for branch $BRANCH_NAME..."
            gh pr create \
              --title "$PR_TITLE" \
              --body-file pr_body.md \
              --base main \
              --head "$BRANCH_NAME"
          fi
