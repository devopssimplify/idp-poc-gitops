name: Delete Infrastructure Resource
on:
  workflow_dispatch:
    inputs:
      resourceType:
        description: 'Type of resource to delete'
        required: true
        type: choice
        options:
          - CockroachDB Database
          - Application Deployment
          - Kafka Cluster
          - Kafka Topics
      resourceName:
        description: 'CockroachDB: database name. Kafka: name prefix (e.g. pds). Application: leave as "app"'
        required: true
        type: string
      environment:
        description: 'Namespace/environment (dev/staging/production). Application: folder name (e.g. pds-501)'
        required: true
        type: string
      reason:
        description: 'Reason for deletion'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  delete-infrastructure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config user.name "Backstage Scaffolder"
          git config user.email "scaffolder@backstage.io"

      - name: Create branch
        env:
          RESOURCE_NAME: ${{ inputs.resourceName }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          BRANCH_NAME="delete-${RESOURCE_NAME}-${ENVIRONMENT}"
          git checkout -b "$BRANCH_NAME"

      - name: Delete CockroachDB files
        if: inputs.resourceType == 'CockroachDB Database'
        env:
          RESOURCE_NAME: ${{ inputs.resourceName }}
        run: |
          FILES_DELETED=false
          if [ -f "infra/cockroachdb-${RESOURCE_NAME}.yaml" ]; then
            git rm "infra/cockroachdb-${RESOURCE_NAME}.yaml"
            FILES_DELETED=true
          fi
          if [ -f "infra/cockroachdb-${RESOURCE_NAME}-backup.yaml" ]; then
            git rm "infra/cockroachdb-${RESOURCE_NAME}-backup.yaml"
            FILES_DELETED=true
          fi
          echo "FILES_DELETED=$FILES_DELETED" >> $GITHUB_ENV

      - name: Delete Application files
        if: inputs.resourceType == 'Application Deployment'
        env:
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          FILES_DELETED=false
          if [ -d "apps/${ENVIRONMENT}" ]; then
            git rm -r "apps/${ENVIRONMENT}"
            FILES_DELETED=true
          fi
          echo "FILES_DELETED=$FILES_DELETED" >> $GITHUB_ENV

      - name: Delete Kafka Cluster files
        if: inputs.resourceType == 'Kafka Cluster'
        env:
          RESOURCE_NAME: ${{ inputs.resourceName }}
        run: |
          FILES_DELETED=false
          for FILE in \
            "infra/kafka-${RESOURCE_NAME}-kafka.yaml" \
            "infra/kafka-ui-${RESOURCE_NAME}.yaml"; do
            if [ -f "$FILE" ]; then
              git rm "$FILE"
              FILES_DELETED=true
              echo "Deleted: $FILE"
            else
              echo "Not found (skipping): $FILE"
            fi
          done
          echo "FILES_DELETED=$FILES_DELETED" >> $GITHUB_ENV

      - name: Delete Kafka Topics files
        if: inputs.resourceType == 'Kafka Topics'
        env:
          RESOURCE_NAME: ${{ inputs.resourceName }}
        run: |
          FILES_DELETED=false
          TOPICS_FILE="infra/kafka-topics-${RESOURCE_NAME}.yaml"
          if [ -f "$TOPICS_FILE" ]; then
            git rm "$TOPICS_FILE"
            FILES_DELETED=true
            echo "Deleted: $TOPICS_FILE"
          else
            echo "Not found (skipping): $TOPICS_FILE"
          fi
          echo "FILES_DELETED=$FILES_DELETED" >> $GITHUB_ENV

      - name: Commit changes
        env:
          RESOURCE_TYPE: ${{ inputs.resourceType }}
          RESOURCE_NAME: ${{ inputs.resourceName }}
          ENVIRONMENT: ${{ inputs.environment }}
          REASON: ${{ inputs.reason }}
        run: |
          if [ "$FILES_DELETED" = "true" ]; then
            git commit -m "chore: Delete ${RESOURCE_TYPE} - ${RESOURCE_NAME} in ${ENVIRONMENT}

Reason: ${REASON}
Generated by Backstage Scaffolder"
          else
            echo "No files found to delete for ${RESOURCE_TYPE} '${RESOURCE_NAME}'"
            exit 1
          fi

      - name: Push branch
        env:
          RESOURCE_NAME: ${{ inputs.resourceName }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          BRANCH_NAME="delete-${RESOURCE_NAME}-${ENVIRONMENT}"
          git push --force origin "$BRANCH_NAME"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RESOURCE_TYPE: ${{ inputs.resourceType }}
          RESOURCE_NAME: ${{ inputs.resourceName }}
          ENVIRONMENT: ${{ inputs.environment }}
          REASON: ${{ inputs.reason }}
        run: |
          BRANCH_NAME="delete-${RESOURCE_NAME}-${ENVIRONMENT}"
          PR_TITLE="chore: Delete ${RESOURCE_TYPE} - ${RESOURCE_NAME} in ${ENVIRONMENT}"

          cat > pr_body.md << EOF
          ## Infrastructure Deletion Request

          **Resource Type**: ${RESOURCE_TYPE}
          **Resource Name**: ${RESOURCE_NAME}
          **Environment**: ${ENVIRONMENT}
          **Reason**: ${REASON}

          ---

          ## Next Steps

          1. **Review this PR** — Verify the correct files are being deleted
          2. **Merge this PR** — Config Sync will remove the resources from the cluster
          3. **Verify Deletion** — After merge, run:
          \`\`\`bash
          kubectl get all -n ${ENVIRONMENT} | grep ${RESOURCE_NAME}
          \`\`\`

          > **WARNING**: This action cannot be undone.

          _This PR was created by the Backstage scaffolder via GitHub Actions._
          EOF

          EXISTING_PR=$(gh pr list --head "$BRANCH_NAME" --json number --jq '.[0].number' || echo "")
          if [ -n "$EXISTING_PR" ]; then
            gh pr edit "$EXISTING_PR" --title "$PR_TITLE" --body-file pr_body.md
          else
            gh pr create \
              --title "$PR_TITLE" \
              --body-file pr_body.md \
              --base main \
              --head "$BRANCH_NAME"
          fi
