name: Delete Infrastructure Resource

on:
  workflow_dispatch:
    inputs:
      resourceType:
        description: Type of resource to delete
        required: true
        type: choice
        options:
          - CockroachDB Database
          - Application Deployment
          - Kafka Cluster
          - Kafka Topics
      resourceName:
        description: Resource name or name prefix (Kafka use namePrefix e.g. pds)
        required: true
        type: string
      environment:
        description: Namespace/environment
        required: true
        type: string
      reason:
        description: Reason for deletion
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  delete-infrastructure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config user.name "Backstage Scaffolder"
          git config user.email "scaffolder@backstage.io"

      - name: Create branch
        run: git checkout -b "delete-${{ inputs.resourceName }}-${{ inputs.environment }}"

      - name: Delete CockroachDB files
        if: inputs.resourceType == 'CockroachDB Database'
        run: |
          FILES_DELETED=false
          for f in "infra/cockroachdb-${{ inputs.resourceName }}.yaml" "infra/cockroachdb-${{ inputs.resourceName }}-backup.yaml"; do
            [ -f "$f" ] && git rm "$f" && FILES_DELETED=true
          done
          echo "FILES_DELETED=$FILES_DELETED" >> $GITHUB_ENV

      - name: Delete Application files
        if: inputs.resourceType == 'Application Deployment'
        run: |
          FILES_DELETED=false
          [ -d "apps/${{ inputs.environment }}" ] && git rm -r "apps/${{ inputs.environment }}" && FILES_DELETED=true
          echo "FILES_DELETED=$FILES_DELETED" >> $GITHUB_ENV

      - name: Delete Kafka Cluster files
        if: inputs.resourceType == 'Kafka Cluster'
        run: |
          FILES_DELETED=false
          for f in "infra/kafka-${{ inputs.resourceName }}-kafka.yaml" "infra/kafka-ui-${{ inputs.resourceName }}.yaml"; do
            [ -f "$f" ] && git rm "$f" && FILES_DELETED=true && echo "Deleted: $f"
          done
          echo "FILES_DELETED=$FILES_DELETED" >> $GITHUB_ENV

      - name: Delete Kafka Topics files
        if: inputs.resourceType == 'Kafka Topics'
        run: |
          FILES_DELETED=false
          f="infra/kafka-topics-${{ inputs.resourceName }}.yaml"
          [ -f "$f" ] && git rm "$f" && FILES_DELETED=true && echo "Deleted: $f"
          echo "FILES_DELETED=$FILES_DELETED" >> $GITHUB_ENV

      - name: Commit and push
        run: |
          if [ "$FILES_DELETED" = "true" ]; then
            git commit -m "chore: delete ${{ inputs.resourceType }} - ${{ inputs.resourceName }} in ${{ inputs.environment }}"
            git push --force origin "delete-${{ inputs.resourceName }}-${{ inputs.environment }}"
          else
            echo "No files found for ${{ inputs.resourceName }}"
            exit 1
          fi

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="delete-${{ inputs.resourceName }}-${{ inputs.environment }}"
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq ".[0].number" || echo "")
          if [ -n "$EXISTING" ]; then
            gh pr edit "$EXISTING" --title "chore: Delete ${{ inputs.resourceType }} - ${{ inputs.resourceName }} in ${{ inputs.environment }}"
          else
            gh pr create               --title "chore: Delete ${{ inputs.resourceType }} - ${{ inputs.resourceName }} in ${{ inputs.environment }}"               --body "**Resource**: ${{ inputs.resourceName }} | **Environment**: ${{ inputs.environment }} | **Reason**: ${{ inputs.reason }}"               --base main               --head "$BRANCH"
          fi
