---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: pds-kafka
  namespace: dev
  labels:
    app: pds-kafka
    team: platform
    managed-by: backstage
  annotations:
    description: "test"
spec:
  kafka:
    version: 3.7.1
    replicas: 1
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      log.retention.hours: 168
      log.segment.bytes: 1073741824
    livenessProbe:
      initialDelaySeconds: 120
      timeoutSeconds: 5
      periodSeconds: 20
      failureThreshold: 3
    readinessProbe:
      initialDelaySeconds: 120
      timeoutSeconds: 5
      periodSeconds: 20
      failureThreshold: 3
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "200m"
        memory: "512Mi"
    storage:
      type: persistent-claim
      size: 5Gi
      deleteClaim: false
      class: standard-rwo
    template:
      pod:
        affinity:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchExpressions:
                      - key: app
                        operator: In
                        values:
                          - pds-kafka
                  topologyKey: kubernetes.io/hostname
        metadata:
          labels:
            app: pds-kafka
            team: platform
  zookeeper:
    replicas: 1
    storage:
      type: persistent-claim
      size: 5Gi
      deleteClaim: false
      class: standard-rwo
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
    template:
      pod:
        metadata:
          labels:
            app: pds-kafka
            team: platform
  entityOperator:
    topicOperator:
      resources:
        requests:
          cpu: "50m"
          memory: "128Mi"
        limits:
          cpu: "200m"
          memory: "256Mi"
      livenessProbe:
        initialDelaySeconds: 120
        timeoutSeconds: 5
        periodSeconds: 20
        failureThreshold: 3
      readinessProbe:
        initialDelaySeconds: 120
        timeoutSeconds: 5
        periodSeconds: 20
        failureThreshold: 3
    userOperator:
      resources:
        requests:
          cpu: "50m"
          memory: "128Mi"
        limits:
          cpu: "200m"
          memory: "256Mi"
      livenessProbe:
        initialDelaySeconds: 120
        timeoutSeconds: 5
        periodSeconds: 20
        failureThreshold: 3
      readinessProbe:
        initialDelaySeconds: 120
        timeoutSeconds: 5
        periodSeconds: 20
        failureThreshold: 3
    template:
      topicOperatorContainer:
        env:
          - name: STRIMZI_KUBERNETES_VERSION
            value: "major=1,minor=31"
      userOperatorContainer:
        env:
          - name: STRIMZI_KUBERNETES_VERSION
            value: "major=1,minor=31"
