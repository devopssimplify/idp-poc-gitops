
apiVersion: sql.cnrm.cloud.google.com/v1beta1
kind: SQLInstance
metadata:
  name: pds-507-db
  namespace: config-connector
  labels:
    network-code: cn580005
    team: backend
    managed-by: backstage
  annotations:
    cnrm.cloud.google.com/project-id: project-7d27fad9-61bb-42c4-b2e
spec:
  databaseVersion: POSTGRES_15
  region: us-central1
  settings:
    tier: db-f1-micro
    diskSize: 10
    diskType: PD_SSD
    backupConfiguration:
      enabled: true
      startTime: "03:00"
    ipConfiguration:
      ipv4Enabled: true
      authorizedNetworks:
        - name: allow-all
          value: 0.0.0.0/0
    locationPreference:
      zone: us-central1-a
---
apiVersion: sql.cnrm.cloud.google.com/v1beta1
kind: SQLDatabase
metadata:
  name: pds-507-maindb
  namespace: config-connector
spec:
  instanceRef:
    name: pds-507-db
---
apiVersion: sql.cnrm.cloud.google.com/v1beta1
kind: SQLUser
metadata:
  name: pds-507-dbuser
  namespace: config-connector
spec:
  instanceRef:
    name: pds-507-db
  password:
    valueFrom:
      secretKeyRef:
        name: pds-507-db-secret
        key: password
---
apiVersion: v1
kind: Secret
metadata:
  name: pds-507-db-secret
  namespace: config-connector
type: Opaque
stringData:
  password: "changeme-generate-secure-password"
