---
apiVersion: v1
kind: Pod
metadata:
  name: pds-kafka-ui
  namespace: dev
  labels:
    app: pds-kafka-ui
    team: platform
    network-code: CN580005
    managed-by: backstage
spec:
  containers:
    - name: kafka-ui
      image: provectuslabs/kafka-ui:latest
      ports:
        - containerPort: 8080
          name: http
      env:
        - name: KAFKA_CLUSTERS_0_NAME
          value: pds-kafka
        - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
          value: pds-kafka-kafka-bootstrap.dev.svc.cluster.local:9092
      resources:
        requests:
          cpu: "100m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
      livenessProbe:
        httpGet:
          path: /actuator/health
          port: 8080
        initialDelaySeconds: 60
        periodSeconds: 30
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /actuator/health
          port: 8080
        initialDelaySeconds: 30
        periodSeconds: 10
        failureThreshold: 3
  restartPolicy: Always
