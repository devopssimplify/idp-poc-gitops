---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cockroachdb-test-1000-db
  namespace: dev
  labels:
    app: cockroachdb-test-1000-db
    team: platform
    managed-by: backstage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cockroachdb-test-1000-db
  namespace: dev
  labels:
    app: cockroachdb-test-1000-db
    team: platform
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cockroachdb-test-1000-db
  namespace: dev
  labels:
    app: cockroachdb-test-1000-db
    team: platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cockroachdb-test-1000-db
subjects:
- kind: ServiceAccount
  name: cockroachdb-test-1000-db
  namespace: dev
---
apiVersion: v1
kind: Service
metadata:
  name: cockroachdb-test-1000-db
  namespace: dev
  labels:
    app: cockroachdb-test-1000-db
    team: platform
    managed-by: backstage
  annotations:
    description: "CockroachDB public service for test-1000-db"
    prometheus.io/scrape: "true"
    prometheus.io/path: "_status/vars"
    prometheus.io/port: "8080"
spec:
  type: ClusterIP
  ports:
  - port: 26257
    targetPort: 26257
    name: grpc
  - port: 8080
    targetPort: 8080
    name: http
  selector:
    app: cockroachdb-test-1000-db
---
apiVersion: v1
kind: Service
metadata:
  name: cockroachdb-test-1000-db-headless
  namespace: dev
  labels:
    app: cockroachdb-test-1000-db
    team: platform
    managed-by: backstage
  annotations:
    description: "CockroachDB headless service for internal communication"
    service.alpha.kubernetes.io/tolerate-unready-endpoints: "true"
    prometheus.io/scrape: "true"
    prometheus.io/path: "_status/vars"
    prometheus.io/port: "8080"
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
  - port: 26257
    targetPort: 26257
    name: grpc
  - port: 8080
    targetPort: 8080
    name: http
  selector:
    app: cockroachdb-test-1000-db
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cockroachdb-test-1000-db-budget
  namespace: dev
  labels:
    app: cockroachdb-test-1000-db
    team: platform
spec:
  selector:
    matchLabels:
      app: cockroachdb-test-1000-db
  maxUnavailable: 1
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cockroachdb-test-1000-db
  namespace: dev
  labels:
    app: cockroachdb-test-1000-db
    team: platform
    managed-by: backstage
  annotations:
    description: "test db"
spec:
  serviceName: cockroachdb-test-1000-db-headless
  replicas: 1
  selector:
    matchLabels:
      app: cockroachdb-test-1000-db
  template:
    metadata:
      labels:
        app: cockroachdb-test-1000-db
        team: platform
    spec:
      serviceAccountName: cockroachdb-test-1000-db
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - cockroachdb-test-1000-db
              topologyKey: kubernetes.io/hostname
      containers:
      - name: cockroachdb
        image: cockroachdb/cockroach:v23.1.11
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: "100m"
            memory: "512Mi"
          limits:
            cpu: "200m"
            memory: "1Gi"
        ports:
        - containerPort: 26257
          name: grpc
        - containerPort: 8080
          name: http
        livenessProbe:
          httpGet:
            path: "/health"
            port: http
            scheme: HTTPS
          initialDelaySeconds: 30
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: "/health?ready=1"
            port: http
            scheme: HTTPS
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 2
        volumeMounts:
        - name: datadir
          mountPath: /cockroach/cockroach-data
        env:
        - name: COCKROACH_CHANNEL
          value: kubernetes-insecure
        - name: GOMAXPROCS
          valueFrom:
            resourceFieldRef:
              resource: limits.cpu
              divisor: "1"
        - name: MEMORY_LIMIT_MIB
          valueFrom:
            resourceFieldRef:
              resource: limits.memory
              divisor: "1Mi"
        command:
          - "/bin/bash"
          - "-ecx"
          - |
            exec /cockroach/cockroach start \
            --logtostderr \
            --insecure \
            --advertise-host $(hostname -f) \
            --http-addr 0.0.0.0 \
            --join cockroachdb-test-1000-db-0.cockroachdb-test-1000-db-headless.dev.svc.cluster.local:26257,cockroachdb-test-1000-db-1.cockroachdb-test-1000-db-headless.dev.svc.cluster.local:26257,cockroachdb-test-1000-db-2.cockroachdb-test-1000-db-headless.dev.svc.cluster.local:26257 \
            --cache $(expr $MEMORY_LIMIT_MIB / 4)MiB \
            --max-sql-memory $(expr $MEMORY_LIMIT_MIB / 4)MiB
      terminationGracePeriodSeconds: 60
      volumes:
      - name: datadir
        persistentVolumeClaim:
          claimName: datadir
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
  volumeClaimTemplates:
  - metadata:
      name: datadir
      labels:
        app: cockroachdb-test-1000-db
        team: platform
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: "5Gi"
      storageClassName: standard-rwo
---
apiVersion: batch/v1
kind: Job
metadata:
  name: cockroachdb-test-1000-db-init
  namespace: dev
  labels:
    app: cockroachdb-test-1000-db
    team: platform
    managed-by: backstage
  annotations:
    description: "Initialize CockroachDB cluster"
spec:
  template:
    metadata:
      labels:
        app: cockroachdb-test-1000-db-init
    spec:
      serviceAccountName: cockroachdb-test-1000-db
      restartPolicy: OnFailure
      containers:
      - name: cluster-init
        image: cockroachdb/cockroach:v23.1.11
        imagePullPolicy: IfNotPresent
        command:
          - "/bin/bash"
          - "-ecx"
          - |
            # Wait for DNS to be ready
            until nslookup cockroachdb-test-1000-db-headless.dev.svc.cluster.local; do
              echo "Waiting for DNS..."
              sleep 2
            done

            # Initialize the cluster
            /cockroach/cockroach init \
            --insecure \
            --host=cockroachdb-test-1000-db-0.cockroachdb-test-1000-db-headless.dev.svc.cluster.local:26257 || true

            # Wait for cluster to be ready
            sleep 10

            # Create default database
            /cockroach/cockroach sql \
            --insecure \
            --host=cockroachdb-test-1000-db-0.cockroachdb-test-1000-db-headless.dev.svc.cluster.local:26257 \
            --execute="CREATE DATABASE IF NOT EXISTS test-1000-db;"

            echo "CockroachDB cluster initialized successfully"
